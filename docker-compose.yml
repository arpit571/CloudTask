version: "3.9"

services:

  backend:
    build: ./server
    container_name: cloudtask-backend

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    depends_on:
      - mongo

  mongo:
    image: mongo:8

    container_name: cloudtask-db

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: